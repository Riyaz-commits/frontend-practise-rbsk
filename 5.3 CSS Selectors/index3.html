<head>
  <title>CSS Display Property Example</title>
  <style>
    p {
      color: white;
    }

    .red {      
     
       display: inline- block;
        width: 100px;
      height: 100px;
      background-color: red;

    }

    .green {
       display: inline-block;
      width: 100px;
      height: 100px;
      background-color: green;
    }

    .blue {
      display: inline-block;
      width: 100px;
      height: 100px;
      background-color: blue;
       

    }
  </style>
</head>


<body>
  <h1>CSS Display Property</h1>
  <p class="red">Red P </p>
  <p class="green">Green P</p>
  <p class="blue">Blue P</p>
</body>

</html>
